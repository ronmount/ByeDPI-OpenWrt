name: build

on:
  workflow_dispatch:

env:
  PACKAGE_NAME: byedpi
  CACHE_DIR: ~/cache

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.prepare.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: 24.10
            branch: openwrt-24.10
            arch: aarch64_cortex-a53
            sdk_url_path: https://downloads.openwrt.org/releases/24.10.6/targets/bcm27xx/bcm2710
            sdk_name: -sdk-24.10.6-bcm27xx-bcm2710_
          - id: 25.12
            branch: openwrt-25.12
            arch: aarch64_cortex-a53
            sdk_url_path: https://downloads.openwrt.org/releases/25.12.4/targets/bcm27xx/bcm2710
            sdk_name: -sdk-25.12.4-bcm27xx-bcm2710_
    env:
      SDK_URL_PATH: ${{ matrix.sdk_url_path }}
      SDK_NAME: ${{ matrix.sdk_name }}
      CCACHE_DIR: ~/.ccache
      CONFIG_CCACHE: y
    defaults: { run: { shell: bash } }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare cache key
        id: cache_key
        run: echo "timestamp=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CACHE_DIR }}
            ${{ env.CCACHE_DIR }}
          key: openwrt-${{ matrix.arch }}-${{ matrix.id }}-${{ env.PACKAGE_NAME }}-${{ steps.cache_key.outputs.timestamp }}
          restore-keys: |
            openwrt-${{ matrix.arch }}-${{ matrix.id }}-${{ env.PACKAGE_NAME }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y ccache gettext libncurses5-dev xsltproc zstd

      - name: Create directories
        run: |
          CACHE_DIR_SDK="$(eval echo "$CACHE_DIR/sdk")"
          CACHE_DIR_DL="$(eval echo "$CACHE_DIR/dl")"
          CACHE_DIR_FEEDS="$(eval echo "$CACHE_DIR/feeds")"
          mkdir -p "$CACHE_DIR_SDK" "$CACHE_DIR_DL" "$CACHE_DIR_FEEDS"
          echo "CACHE_DIR_SDK=$CACHE_DIR_SDK" >> "$GITHUB_ENV"
          echo "CACHE_DIR_DL=$CACHE_DIR_DL" >> "$GITHUB_ENV"
          echo "CACHE_DIR_FEEDS=$CACHE_DIR_FEEDS" >> "$GITHUB_ENV"
          echo "SDK_HOME=$(mktemp -d)" >> "$GITHUB_ENV"

      - name: Download and unpack SDK
        run: |
          cd "$CACHE_DIR_SDK"
          if ! ( wget -q -O - "$SDK_URL_PATH/sha256sums" | grep -- "$SDK_NAME" > sha256sums.small 2>/dev/null ) ; then
            echo "::error::Can not find ${SDK_NAME} file in sha256sums."
            exit 1
          fi
          SDK_FILE="$(cut -d' ' -f2 sha256sums.small | sed 's/*//g')"
          if ! sha256sum -c ./sha256sums.small >/dev/null 2>&1 ; then
            wget -q -O "$SDK_FILE" "$SDK_URL_PATH/$SDK_FILE"
            if ! sha256sum -c ./sha256sums.small >/dev/null 2>&1 ; then
              echo "::error::SDK can not be verified!"
              exit 1
            fi
          fi
          tar -C "$SDK_HOME" --strip=1 -xf "$CACHE_DIR_SDK/$SDK_FILE"
          cd "$SDK_HOME"
          rm -rf dl feeds
          ln -s "$CACHE_DIR_DL" dl
          ln -s "$CACHE_DIR_FEEDS" feeds
          cp feeds.conf.default feeds.conf
          sed -i 's#git.openwrt.org/openwrt/openwrt#github.com/openwrt/openwrt#' feeds.conf
          sed -i 's#git.openwrt.org/feed/packages#github.com/openwrt/packages#' feeds.conf
          sed -i 's#git.openwrt.org/project/luci#github.com/openwrt/luci#' feeds.conf
          sed -i 's#git.openwrt.org/feed/telephony#github.com/openwrt/telephony#' feeds.conf

      - name: Prepare build
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: 'hufrea/byedpi'
        run : |
          TAG=$(wget -qO- --header="Authorization: token $GH_TOKEN" http://api.github.com/repos/$REPO/releases/latest | grep -Po '"tag_name": "\K.+?(?=")')
          sed "s|@VERSION@|${TAG#v}|" -i byedpi/Makefile
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build package
        id: build
        env:
          ARCH: ${{ matrix.arch }}
          BRANCH: ${{ matrix.branch }}
          SIGN_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
        run: |
          cd "$SDK_HOME"
          echo "src-link byedpi $GITHUB_WORKSPACE" >> feeds.conf
          ./scripts/feeds update byedpi
          ./scripts/feeds install -a -p byedpi
          make defconfig
          make package/byedpi/compile V=s -j$(nproc) BUILD_LOG=1

          if [ -n "$SIGN_KEY" ]; then
            echo "$SIGN_KEY" | base64 -d > key-build
          fi

          PACKAGE_DIR="$(find "$SDK_HOME/bin/packages" -mindepth 2 -maxdepth 2 -type d -name byedpi -print -quit)"
          if [ -z "$PACKAGE_DIR" ]; then
            echo "::error::Package directory not found"
            exit 1
          fi

          export PATH="$SDK_HOME/staging_dir/host/bin:$PATH"
          export MKHASH="$SDK_HOME/staging_dir/host/bin/mkhash"

          if compgen -G "$PACKAGE_DIR/*.ipk" > /dev/null; then
            (
              cd "$PACKAGE_DIR"
              "$SDK_HOME/scripts/ipkg-make-index.sh" . > Packages.manifest
              grep -vE '^(Maintainer|LicenseFiles|Source|SourceName|Require|SourceDateEpoch)' Packages.manifest > Packages
              "$SDK_HOME/scripts/make-index-json.py" -f opkg -a "$ARCH" Packages > index.json
              gzip -9nc Packages > Packages.gz
            )
            if [ -s key-build ]; then
              ./staging_dir/host/bin/usign -S -m "$PACKAGE_DIR/Packages" -s key-build
            fi
          fi

          if compgen -G "$PACKAGE_DIR/*.apk" > /dev/null; then
            (
              cd "$PACKAGE_DIR"
              "$SDK_HOME/staging_dir/host/bin/apk" mkndx \
                --root "$SDK_HOME" \
                --keys-dir "$SDK_HOME" \
                --allow-untrusted \
                --output packages.adb \
                *.apk
            )
            "$SDK_HOME/staging_dir/host/bin/apk" adbdump --format json "$PACKAGE_DIR/packages.adb" | \
              "$SDK_HOME/scripts/make-index-json.py" -f apk -a "$ARCH" - > "$PACKAGE_DIR/index.json"
          fi

          tar -C "$PACKAGE_DIR" -cvf "$GITHUB_WORKSPACE/ipk-$BRANCH-$ARCH.tar" --transform "s|^\./|${BRANCH/openwrt-}/$ARCH/|" --show-transformed-names .

      - name: Compress build logs
        if: always()
        env:
          ARCH: ${{ matrix.arch }}
          BRANCH: ${{ matrix.branch }}
        run: |
          if [ -d "$SDK_HOME/logs" ]; then
            tar -cJvf logs-$BRANCH-$ARCH.tar.xz "$SDK_HOME/logs"
          else
            mkdir empty-logs
            tar -cJvf logs-$BRANCH-$ARCH.tar.xz empty-logs
          fi

      - name: Upload packages
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.branch }}-${{ matrix.arch }}
          path: ipk-${{ matrix.branch }}-${{ matrix.arch }}.tar
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.branch }}-${{ matrix.arch }}
          path: logs-*.tar.xz

  gh-pages:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*

      - name: Prepare files
        run: |
          mkdir public
          find . -name 'ipk-*.tar' -exec tar -C ./public -xvf {} \;
          cat <<EOF >> public/public.key
          untrusted comment: ByeDPI OpenWrt repo
          RWRT/Cfg5ReIbqWME8QTUQ1FKxp8FTr9M9g1vDsL8uIdRyP5TTNAk4QA
          EOF

      - name: Deploy to GH pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          full_commit_message: 'ByeDPI ${{ needs.build.outputs.tag }}'
          force_orphan: true

  release:
    needs: [ build, gh-pages ]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        branch:
          - '24.10'
          - '25.12'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*

      - name: Prepare files
        env:
          BRANCH: ${{ matrix.branch }}
        run: |
          find . -name "ipk-openwrt-$BRANCH-*.tar" -exec tar -xvf {} --wildcards '*.ipk' '*.apk' \;

      - name: Upload OpenWrt 24.10 release assets
        if: matrix.branch == '24.10'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          tag_name: ${{ needs.build.outputs.tag }}-${{ matrix.branch }}
          name: ${{ needs.build.outputs.tag }} for OpenWrt ${{ matrix.branch }}
          target_commitish: gh-pages
          body: |
            ### ByeDPI ${{ needs.build.outputs.tag }} for OpenWrt ${{ matrix.branch }}

            -----
            Check the package architecture of your device using the command:
            ```
            # awk -F\' '/DISTRIB_ARCH/ {print $2}' /etc/openwrt_release
            ```
          files: ./**/*.ipk

      - name: Upload OpenWrt 25.12 release assets
        if: matrix.branch == '25.12'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          tag_name: ${{ needs.build.outputs.tag }}-${{ matrix.branch }}
          name: ${{ needs.build.outputs.tag }} for OpenWrt ${{ matrix.branch }}
          target_commitish: gh-pages
          body: |
            ### ByeDPI ${{ needs.build.outputs.tag }} for OpenWrt ${{ matrix.branch }}

            -----
            Check the package architecture of your device using the command:
            ```
            # awk -F\' '/DISTRIB_ARCH/ {print $2}' /etc/openwrt_release
            ```
          files: ./**/*.apk
