name: build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.prepare.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        branch:
          - openwrt-24.10
          - openwrt-25.12
        arch:
          - aarch64_cortex-a53
    container:
      image: openwrt/sdk:${{ matrix.arch }}-${{ matrix.branch }}
      options: --user root
    defaults: { run: { shell: bash } }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SDK
        working-directory: /builder
        run: HOME=/builder ./setup.sh

      - name: Prepare build
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: 'hufrea/byedpi'
        run : |
          TAG=$(wget -qO- --header="Authorization: token $GH_TOKEN" http://api.github.com/repos/$REPO/releases/latest | grep -Po '"tag_name": "\K.+?(?=")')
          sed "s|@VERSION@|${TAG#v}|" -i byedpi/Makefile
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build package
        id: build
        working-directory: /builder
        env:
          ARCH: ${{ matrix.arch }}
          BRANCH: ${{ matrix.branch }}
          SIGN_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
        run: |
          echo "src-link byedpi $GITHUB_WORKSPACE" >> feeds.conf
          ./scripts/feeds update byedpi
          ./scripts/feeds install -a -p byedpi
          make defconfig
          make package/byedpi/compile V=s -j$(nproc) BUILD_LOG=1

          if [ -n "$SIGN_KEY" ]; then
            echo "$SIGN_KEY" | base64 -d > key-build
          fi

          PACKAGE_DIR="$(find ./bin/packages -mindepth 2 -maxdepth 2 -type d -name byedpi -print -quit)"
          if [ -z "$PACKAGE_DIR" ]; then
            echo "::error::Package directory not found"
            exit 1
          fi

          if compgen -G "$PACKAGE_DIR/*.ipk" > /dev/null; then
            ./scripts/ipkg-make-index.sh "$PACKAGE_DIR" > "$PACKAGE_DIR/Packages.manifest"
            grep -vE '^(Maintainer|LicenseFiles|Source|SourceName|Require|SourceDateEpoch)' "$PACKAGE_DIR/Packages.manifest" > "$PACKAGE_DIR/Packages"
            ./scripts/make-index-json.py -f opkg -a "$ARCH" "$PACKAGE_DIR/Packages" > "$PACKAGE_DIR/index.json"
            gzip -9nc "$PACKAGE_DIR/Packages" > "$PACKAGE_DIR/Packages.gz"
            if [ -s key-build ]; then
              ./staging_dir/host/bin/usign -S -m "$PACKAGE_DIR/Packages" -s key-build
            fi
          fi

          if compgen -G "$PACKAGE_DIR/*.apk" > /dev/null; then
            (
              cd "$PACKAGE_DIR"
              /builder/staging_dir/host/bin/apk mkndx \
                --root /builder \
                --keys-dir /builder \
                --allow-untrusted \
                --output packages.adb \
                *.apk
            )
            /builder/staging_dir/host/bin/apk adbdump --format json "$PACKAGE_DIR/packages.adb" | \
              ./scripts/make-index-json.py -f apk -a "$ARCH" - > "$PACKAGE_DIR/index.json"
          fi

          tar -C "$PACKAGE_DIR" -cvf "$GITHUB_WORKSPACE/ipk-$BRANCH-$ARCH.tar" --transform "s|^\./|${BRANCH/openwrt-}/$ARCH/|" --show-transformed-names .

      - name: Compress build logs
        if: always()
        env:
          ARCH: ${{ matrix.arch }}
          BRANCH: ${{ matrix.branch }}
          LOGS_DIR: /builder/logs
        run: |
          tar -cJvf logs-$BRANCH-$ARCH.tar.xz $LOGS_DIR

      - name: Upload packages
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.branch }}-${{ matrix.arch }}
          path: ipk-${{ matrix.branch }}-${{ matrix.arch }}.tar
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.branch }}-${{ matrix.arch }}
          path: logs-*.tar.xz

  gh-pages:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*

      - name: Prepare files
        run: |
          mkdir public
          find . -name 'ipk-*.tar' -exec tar -C ./public -xvf {} \;
          cat <<EOF >> public/public.key
          untrusted comment: ByeDPI OpenWrt repo
          RWRT/Cfg5ReIbqWME8QTUQ1FKxp8FTr9M9g1vDsL8uIdRyP5TTNAk4QA
          EOF

      - name: Deploy to GH pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          full_commit_message: 'ByeDPI ${{ needs.build.outputs.tag }}'
          force_orphan: true

  release:
    needs: [ build, gh-pages ]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        branch:
          - '24.10'
          - '25.12'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*

      - name: Prepare files
        env:
          BRANCH: ${{ matrix.branch }}
        run: |
          find . -name "ipk-openwrt-$BRANCH-*.tar" -exec tar -xvf {} --wildcards '*.ipk' '*.apk' \;

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          tag_name: ${{ needs.build.outputs.tag }}-${{ matrix.branch }}
          name: ${{ needs.build.outputs.tag }} for OpenWrt ${{ matrix.branch }}
          target_commitish: gh-pages
          body: |
            ### ByeDPI ${{ needs.build.outputs.tag }} for OpenWrt ${{ matrix.branch }}

            -----
            Check the package architecture of your device using the command:
            ```
            # awk -F\' '/DISTRIB_ARCH/ {print $2}' /etc/openwrt_release
            ```
          files: |
            ./**/*.ipk
            ./**/*.apk
